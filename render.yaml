# render.yaml — Render deployment configuration
services:
  - type: web
    name: edumitra
    runtime: python
    buildCommand: "pip install -r requirements.txt && python train_and_seed.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.7"
    plan: free
    autoDeploy: true
