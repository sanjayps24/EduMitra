<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Performance Profile — Detailed academic analysis and risk prediction.">
    <title>Student Profile — EduMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#6C63FF', 'primary-light': '#8B83FF', secondary: '#FF6584', accent: '#43E97B', dark: { 900: '#0F0E17', 800: '#1A1A2E', 700: '#16213E' } },
                fontFamily: { sans: ['Inter', 'sans-serif'] }
            }}
        }
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
    <div class="animated-bg"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 px-6 py-4" style="background:rgba(15,14,23,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(108,99,255,0.1)">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/" class="logo" style="font-size:1.4rem;text-decoration:none">
                <div class="logo-icon" style="width:38px;height:38px;font-size:1.1rem;border-radius:11px">🎓</div>
                <span class="gradient-text">EduMitra</span>
            </a>
            <div class="flex items-center gap-4">
                <button onclick="goBack()" class="btn-secondary btn-sm">← Back</button>
                <button onclick="profileLogout()" class="btn-sm" style="background:rgba(255,71,87,0.1);color:var(--danger);border:none;padding:8px 16px;border-radius:10px;font-size:0.8rem;cursor:pointer">Logout</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8" id="profileContent">
        <!-- Student Header Card -->
        <div class="glass-card p-8 mb-8 fade-in-up">
            <div class="flex flex-col md:flex-row items-start md:items-center gap-6">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center text-3xl font-black" style="background:var(--gradient-1);box-shadow:0 8px 30px rgba(108,99,255,0.3)">
                    <span id="studentInitial">S</span>
                </div>
                <div class="flex-1">
                    <h1 class="text-2xl font-black" id="studentName">Loading...</h1>
                    <p class="text-sm font-mono mt-1" style="color:var(--primary-light)" id="studentUSN"></p>
                    <p class="text-sm mt-1" style="color:var(--text-muted)" id="studentDept"></p>
                    <p class="text-xs mt-1" style="color:var(--text-muted)" id="studentEmail"></p>
                </div>
                <div class="flex gap-3">
                    <span id="classificationBadge" class="badge" style="font-size:0.9rem;padding:8px 20px">—</span>
                    <span id="riskBadge" class="badge" style="font-size:0.9rem;padding:8px 20px">—</span>
                </div>
            </div>
        </div>

        <!-- Performance Overview Circles -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 text-center fade-in-up fade-in-up-delay-1">
                <h3 class="text-sm font-semibold mb-4" style="color:var(--text-muted)">Avg Exam Score</h3>
                <div class="circle-progress mx-auto">
                    <canvas id="examCircle" width="120" height="120"></canvas>
                    <div class="progress-text" id="examPercent">0%</div>
                </div>
            </div>
            <div class="glass-card p-6 text-center fade-in-up fade-in-up-delay-2">
                <h3 class="text-sm font-semibold mb-4" style="color:var(--text-muted)">Avg Assignment Score</h3>
                <div class="circle-progress mx-auto">
                    <canvas id="assignCircle" width="120" height="120"></canvas>
                    <div class="progress-text" id="assignPercent">0%</div>
                </div>
            </div>
            <div class="glass-card p-6 text-center fade-in-up fade-in-up-delay-3">
                <h3 class="text-sm font-semibold mb-4" style="color:var(--text-muted)">Avg Attendance</h3>
                <div class="circle-progress mx-auto">
                    <canvas id="attendCircle" width="120" height="120"></canvas>
                    <div class="progress-text" id="attendPercent">0%</div>
                </div>
            </div>
        </div>

        <!-- Risk Analysis -->
        <div class="glass-card p-6 mb-8 fade-in-up">
            <h2 class="text-lg font-bold mb-4">
                <span class="gradient-text">🛡️ Risk Analysis</span>
            </h2>
            <div id="riskDetails">
                <div class="text-center py-8"><div class="spinner mx-auto"></div></div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="chart-container fade-in-up fade-in-up-delay-1" style="height:350px">
                <canvas id="examChart"></canvas>
            </div>
            <div class="chart-container fade-in-up fade-in-up-delay-2" style="height:350px">
                <canvas id="attendancePie"></canvas>
            </div>
            <div class="chart-container fade-in-up fade-in-up-delay-3" style="height:350px">
                <canvas id="performanceRadar"></canvas>
            </div>
            <div class="chart-container fade-in-up fade-in-up-delay-4" style="height:350px">
                <canvas id="assignmentChart"></canvas>
            </div>
        </div>

        <!-- Academic Records Table -->
        <div class="glass-card overflow-hidden fade-in-up">
            <div class="p-4" style="border-bottom:1px solid rgba(255,255,255,0.06)">
                <h2 class="text-lg font-bold gradient-text">📋 Academic Records</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Exam Score</th>
                            <th>Assignment</th>
                            <th>Attendance</th>
                            <th>Semester</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <tr><td colspan="5" class="text-center py-8" style="color:var(--text-muted)">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/student-profile.js"></script>
</body>
</html>
